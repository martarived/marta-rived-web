<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marta Rived</title>
  <style>
    @font-face {
      font-family: 'Foun';
      src: url('Foun.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f2ede3;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #f2ede3;
      display: flex;
      align-items: center;
    }

    #grid-wrap {
      position: absolute;
      inset: -60px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transform: rotate(-4deg) scale(1.14);
      opacity: 0.28;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      will-change: transform;
    }

    .cell {
      flex-shrink: 0;
      width: 150px;
      height: 100px;
      border-radius: 6px;
    }

    .a { background: #0057FF; }
    .b { background: #1a1a1a; }
    .c { background: #ddd5be; }
    .d { background: #1A6BFF; }
    .e { background: #e8e0cc; }
    .f { background: #003ecc; }
    .g { background: #c9bfa6; }
    .h { background: #0047d9; }
    .i { background: #2a2a2a; }
    .j { background: #f5f0e4; border: 1px solid #ddd5be; }

    #overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, #f2ede3 0%, rgba(242,237,227,0.15) 60%, rgba(242,237,227,0.9) 100%),
        linear-gradient(to bottom, rgba(242,237,227,0.5) 0%, transparent 25%, transparent 75%, rgba(242,237,227,0.5) 100%);
      z-index: 5;
    }

    #nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 56px;
    }

    .nav-logo {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(15,10,30,0.5);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(15,10,30,0.36);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #0057FF; }

    #content {
      position: relative;
      z-index: 10;
      padding: 0 56px;
      max-width: 700px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(15,10,30,0.35);
      margin-bottom: 22px;
      opacity: 0;
      animation: up 0.6s ease forwards 0.3s;
    }

    .hero-title {
      font-family: 'Foun', 'Arial Narrow', Arial, sans-serif;
      font-size: clamp(64px, 10vw, 116px);
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: #0d0a1e;
      text-transform: uppercase;
      opacity: 0;
      animation: up 0.9s ease forwards 0.55s;
    }

    .hero-title .dim {
      color: rgba(13,10,30,0.15);
    }

    .hero-sub {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: up 0.7s ease forwards 1.05s;
    }

    .hero-sub span {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(15,10,30,0.3);
    }

    .hero-sub .sep {
      width: 14px;
      height: 0.5px;
      background: rgba(15,10,30,0.18);
    }

    #scroll-hint {
      position: absolute;
      bottom: 28px;
      right: 56px;
      z-index: 20;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(15,10,30,0.2);
      opacity: 0;
      animation: up 0.6s ease forwards 1.5s;
      writing-mode: vertical-rl;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="hero">
  <div id="grid-wrap"></div>
  <div id="overlay"></div>

  <nav id="nav">
    <div class="nav-logo">Marta Rived</div>
    <ul class="nav-links">
      <li><a href="#">Work</a></li>
      <li><a href="#">About me</a></li>
      <li><a href="#">Typing</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div id="content">
    <p class="label">Creative Director · Barna</p>
    <h1 class="hero-title">
      Creative<br>
      <span class="dim">Playmaker</span><br>
      &amp; Brand<br>
      <span class="dim">Storyteller</span>
    </h1>
    <div class="hero-sub">
      <span>Audiovisual</span>
      <div class="sep"></div>
      <span>Brand</span>
      <div class="sep"></div>
      <span>Content</span>
    </div>
  </div>

  <div id="scroll-hint">Scroll</div>
</div>

<script>
  const PALETTE = ['a','a','b','c','c','d','e','e','f','g','g','h','i','j','j','j','c','e','g','j'];
  const ROWS = 6;
  const COLS = 11;
  const SPEEDS = [0.28, -0.19, 0.22, -0.15, 0.25, -0.17];
  const offsets = [0, 75, 20, 55, 10, 40];

  const wrap = document.getElementById('grid-wrap');
  const rows = [];

  for (let r = 0; r < ROWS; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    for (let c = 0; c < COLS * 2; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + PALETTE[Math.floor(Math.random() * PALETTE.length)];
      row.appendChild(cell);
    }
    wrap.appendChild(row);
    rows.push(row);
  }

  function animate() {
    rows.forEach((row, i) => {
      offsets[i] += SPEEDS[i];
      const total = COLS * 160;
      if (offsets[i] > total) offsets[i] -= total;
      if (offsets[i] < -total) offsets[i] += total;
      row.style.transform = 'translateX(' + offsets[i] + 'px)';
    });
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>

</body>
</html>
